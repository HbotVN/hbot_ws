services:
  hbot_sim:
    build:
      context: ../../
      dockerfile: docker/laptop/Dockerfile
    image: hbot_laptop:latest
    container_name: hbot_simulation_container
    network_mode: "host"
    ipc: "host"
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-9}
      - CONTROLLER=${CONTROLLER:-yahboom}
      # Configurable launch parameters with defaults
      - SIMULATION_MODE=True
      - SLAM=True
      - ENABLE_NAVIGATION=True
      - RUN_RVIZ=True
    volumes:
      # Mount workspace source code
      - ../../:/root/hbot_ws
      # Anonymous volumes to isolate docker build artifacts from the host workspace
      - /root/hbot_ws/build
      - /root/hbot_ws/install
      - /root/hbot_ws/log
      # GUI forwarding volumes
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority:ro
    devices:
      # Hardware acceleration for GUI (Intel Integrated Graphics)
      - /dev/dri:/dev/dri
    command: bash -c "./build_packages.sh && ./bringup.sh simulation_mode:=$$SIMULATION_MODE use_sim_time:=$$SIMULATION_MODE slam:=$$SLAM enable_navigation:=$$ENABLE_NAVIGATION run_rviz:=$$RUN_RVIZ"
